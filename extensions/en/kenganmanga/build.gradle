plugins {
    id 'tachiyomi.extension'
}

tachiyomiExtension {
    extName = 'Kengan Manga Online'
    pkgNameSuffix = 'en.kenganmanga'
    extClass = '.KenganManga'
    extVersionCode = 1
    isNsfw = false
}

android {
    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['.'] 
            res.srcDirs = ['res']
        }
    }
}

dependencies {
    implementation 'org.jsoup:jsoup:1.15.3'
}
