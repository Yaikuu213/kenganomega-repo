name: Construct Release

on:
  workflow_dispatch:

jobs:
  assemble_release:
    name: Construct Release Repo
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        
      - name: Construct release Repo
        run: ./gradlew :constructReleaseRepo
        
      - name: Upload repo
        uses: actions/upload-artifact@v4
        with:
          name: release-repo
          path: ./build/repo/release/

  publish_repo:
    name: Publish release repo
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: assemble_release
    steps:
      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          ref: repo
          path: repo
          
      - name: Download updated release
        uses: actions/download-artifact@v4
        with:
          name: release-repo
          path: release
          
      - name: Update and push
        run: |
          cp -r release/* ./repo/
          cd ./repo
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Mise a jour de l'extension" || echo "Aucun changement"
          git push
